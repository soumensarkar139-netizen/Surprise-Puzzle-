<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Surprise for You!</title>
    <style>
        /* General Page Styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fcf5ff; /* Light purple background */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
        }

        .container {
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 85%;
            max-width: 380px;
            position: relative;
        }

        .hidden { display: none !important; }
        
        h1 { color: #a855f7; font-size: 22px; margin-bottom: 20px; }
        p { color: #6b7280; font-size: 16px; }

        /* Buttons */
        .btn {
            background: #a855f7;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(168, 85, 247, 0.3);
        }
        .btn:hover { background: #9333ea; }
        
        .skip-btn {
            background: transparent;
            color: #9ca3af;
            box-shadow: none;
            font-size: 14px;
            margin-top: 25px;
        }

        /* Step 1: Heart Animation */
        .heart {
            font-size: 80px;
            cursor: pointer;
            animation: pulse 1.5s infinite;
            margin: 30px 0;
            user-select: none;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* Step 2: Puzzle Styling */
        #puzzle-board {
            width: 300px;
            height: 300px;
            margin: 0 auto;
            position: relative;
            background: #f3f4f6;
            border-radius: 8px;
            overflow: hidden;
        }
        .tile {
            width: 100px;
            height: 100px;
            position: absolute;
            background-size: 300px 300px;
            border: 1px solid #fff;
            box-sizing: border-box;
            cursor: pointer;
            transition: top 0.2s, left 0.2s;
        }

        /* Step 3: Dodging Button Area */
        .proposal-area { height: 250px; position: relative; }
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }
        #no-btn {
            position: absolute;
            background: #e5e7eb;
            color: #4b5563;
            box-shadow: none;
        }

        /* Step 4: Success GIF */
        .success-gif {
            width: 100%;
            border-radius: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="step1" class="container">
        <p style="color:#a855f7; font-weight:bold; font-size: 14px; margin-bottom: 5px;">Hey there 💜</p>
        <h1 style="color:#1f2937;">Someone made this just for <span style="color:#a855f7;">you</span></h1>
        <div class="heart" onclick="nextStep(2)">💜</div>
        <p style="color:#a855f7; font-weight:bold; background: #f3e8ff; display:inline-block; padding: 8px 16px; border-radius: 20px;">Tap the heart</p>
    </div>

    <div id="step2" class="container hidden">
        <h1>Solve the puzzle ✨</h1>
        <div id="puzzle-board"></div>
        <button class="btn skip-btn" onclick="nextStep(3)">Skip to the main question 👉</button>
    </div>

    <div id="step3" class="container hidden proposal-area">
        <div style="font-size: 40px; margin-bottom: 10px;">🐱💖</div>
        <h1 style="color:#1f2937;">Will you forever be mine?</h1>
        <div class="btn-group">
            <button class="btn" id="yes-btn" onclick="nextStep(4)">Yes 💖</button>
            <button class="btn" id="no-btn">No 🙈</button>
        </div>
    </div>

    <div id="step4" class="container hidden">
        <h1>Yayy! You said YES! 💘</h1>
        <p>Knew you'd say yes 😉</p>
        <img class="success-gif" src="https://media.giphy.com/media/11sBLVxNs7v6WA/giphy.gif" alt="Happy Dance">
    </div>

    <script>
        // --- NAVIGATION LOGIC ---
        function nextStep(step) {
            document.querySelectorAll('.container').forEach(el => el.classList.add('hidden'));
            document.getElementById('step' + step).classList.remove('hidden');
            if(step === 2) initPuzzle();
        }

        // --- DODGING BUTTON LOGIC ---
        const noBtn = document.getElementById('no-btn');
        
        function moveButton() {
            const container = document.getElementById('step3');
            const containerRect = container.getBoundingClientRect();
            const btnRect = noBtn.getBoundingClientRect();
            
            // Calculate random positions within the container box
            const maxX = containerRect.width - btnRect.width - 20;
            const maxY = containerRect.height - btnRect.height - 20;
            
            const randomX = Math.abs(Math.floor(Math.random() * maxX));
            const randomY = Math.abs(Math.floor(Math.random() * maxY) + 80); // Offset to stay below text
            
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        // Trigger movement on mouse hover (desktop) or touch (mobile)
        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            moveButton(); 
        });

        // --- PUZZLE LOGIC ---
        // Replace the link inside the quotes below with your own image link!
        const imageUrl = 'https://images.unsplash.com/photo-1518192161663-5a4233297f09?q=80&w=300&h=300&auto=format&fit=crop'; 
        
        let tiles = [];
        const board = document.getElementById('puzzle-board');
        
        function initPuzzle() {
            board.innerHTML = '';
            // Array representing puzzle pieces. 8 is the empty space.
            tiles = [0, 1, 2, 3, 4, 5, 6, 7, 8]; 
            
            // Shuffle the tiles slightly so it's a game, but not too hard!
            for (let i = 0; i < 15; i++) {
                const emptyIdx = tiles.indexOf(8);
                const possibleMoves = getValidMoves(emptyIdx);
                const randomMove = possibleMoves[Math.floor(Math.random() * possibleMoves.length)];
                [tiles[emptyIdx], tiles[randomMove]] = [tiles[randomMove], tiles[emptyIdx]];
            }
            renderPuzzle();
        }

        function getValidMoves(emptyIndex) {
            const moves = [];
            const row = Math.floor(emptyIndex / 3);
            const col = emptyIndex % 3;
            if (row > 0) moves.push(emptyIndex - 3); // up
            if (row < 2) moves.push(emptyIndex + 3); // down
            if (col > 0) moves.push(emptyIndex - 1); // left
            if (col < 2) moves.push(emptyIndex + 1); // right
            return moves;
        }

        function renderPuzzle() {
            board.innerHTML = '';
            tiles.forEach((originalIndex, currentIndex) => {
                if (originalIndex === 8) return; // Leave empty slot blank
                
                const tile = document.createElement('div');
                tile.classList.add('tile');
                
                // Calculate position on the board
                const x = (currentIndex % 3) * 100;
                const y = Math.floor(currentIndex / 3) * 100;
                tile.style.left = x + 'px';
                tile.style.top = y + 'px';
                
                // Set the correct piece of the image
                const bgX = (originalIndex % 3) * 100;
                const bgY = Math.floor(originalIndex / 3) * 100;
                tile.style.backgroundImage = `url(${imageUrl})`;
                tile.style.backgroundPosition = `-${bgX}px -${bgY}px`;
                
                tile.onclick = () => moveTile(currentIndex);
                board.appendChild(tile);
            });
            checkWin();
        }

        function moveTile(index) {
            const emptyIndex = tiles.indexOf(8);
            const rowDiff = Math.abs(Math.floor(index / 3) - Math.floor(emptyIndex / 3));
            const colDiff = Math.abs((index % 3) - (emptyIndex % 3));
            
            // If the clicked tile is next to the empty space, swap them
            if ((rowDiff === 1 && colDiff === 0) || (rowDiff === 0 && colDiff === 1)) {
                [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
                renderPuzzle();
            }
        }

        function checkWin() {
            const isWin = tiles.every((val, index) => val === index);
            if (isWin) {
                setTimeout(() => {
                    nextStep(3);
                }, 400);
            }
        }
    </script>
</body>
</html>
